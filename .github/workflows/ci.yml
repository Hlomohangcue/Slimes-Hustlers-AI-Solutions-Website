name: Enterprise CI/CD

on:
  # Run validation on all pushes to protected branches.
  push:
    branches: [main, master]
  # Run validation for incoming changes before merge.
  pull_request:
    branches: [main, master]
  # Allow manual execution for release and incident workflows.
  workflow_dispatch:
  # Declare expected deployment secrets for validator compatibility and optional reusable invocation.
  workflow_call:
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false

# Prevent overlapping runs on the same branch to keep signal clean.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Stage 1: Install dependencies and execute automated tests.
  test:
    name: Install And Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run existing automated test suite
        run: |
          npm test
          npm run test:sanitize

  # Stage 2: Validate deployability before any production release.
  validate:
    name: Validate Project
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Validate Cloudflare Worker build (dry run)
        run: npx wrangler deploy --dry-run

  # Stage 3: Deploy to Cloudflare Workers after tests and validation pass.
  deploy:
    name: Deploy To Cloudflare Workers
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
